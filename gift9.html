<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gift #9 — Kiss the Photo Canvas | Navanshi’s 15th</title>
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f051d;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Starfield Canvas Background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .gift-container {
            min-height: 100vh;
            padding: 100px 20px 80px 20px;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-nav {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 100;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 10px 22px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            border-color: rgba(255, 182, 193, 0.6);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
        }

        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(233, 30, 99, 0.3), rgba(255, 105, 180, 0.3));
            color: #ffb6c1;
            border: 1px solid rgba(255, 182, 193, 0.4);
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.2);
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            background: linear-gradient(135deg, #ffffff, #ffb6c1, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            font-size: 1.05rem;
            color: #fce4ec;
            opacity: 0.85;
        }

        /* Kiss Canvas Card */
        .canvas-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            border: 1px solid rgba(255, 192, 203, 0.3);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* The interactive Photo Area */
        .photo-canvas {
            width: 100%;
            height: 550px;
            background-color: rgba(0, 0, 0, 0.5);
            background-image: url('https://via.placeholder.com/800x600/1a0933/ffb6c1?text=Upload+a+Photo+to+Kiss+💋');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 24px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            cursor: crosshair; /* Shows it's interactive */
            transition: background-image 0.3s ease;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6);
        }

        /* Kiss Emoji Styling */
        .kiss-emoji {
            position: absolute;
            font-size: 2.5rem;
            pointer-events: none; /* Can't click the emoji itself */
            user-select: none;
            transform: translate(-50%, -50%) scale(0);
            animation: kissPop 1s ease-out forwards;
            filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.5));
            z-index: 10;
        }

        @keyframes kissPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            15% { transform: translate(-50%, -50%) scale(1.3); }
            30% { transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0.8) translateY(-20px); opacity: 0; }
        }

        /* Controls Area */
        .canvas-controls {
            display: flex;
            gap: 15px;
            margin-top: 1.5rem;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-btn:hover {
            background: rgba(255, 105, 180, 0.25);
            border-color: #ff69b4;
            transform: translateY(-2px);
        }

        .primary-btn {
            background: linear-gradient(135deg, #ff69b4, #e91e63);
            border: none;
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.3);
        }

        .primary-btn:hover {
            background: linear-gradient(135deg, #ff85c0, #ff1a75);
            box-shadow: 0 8px 25px rgba(255, 105, 180, 0.5);
        }

        /* Hidden File Input */
        #fileInput {
            display: none;
        }

        @media (max-width: 600px) {
            .page-title { font-size: 2.1rem; }
            .photo-canvas { height: 380px; }
            .kiss-emoji { font-size: 2rem; }
            .control-btn { padding: 10px 20px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <!-- Starfield Background Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Navigation -->
    <div class="back-nav">
        <a href="index.html" class="glass-btn">
            ← Back to Dashboard
        </a>
    </div>

    <div class="gift-container">
        <header class="page-header">
            <span class="page-badge">Gift #9 • Interactive Kisses</span>
            <h1 class="page-title">Kiss the Photo Canvas 💋</h1>
            <p class="page-subtitle">Upload your favorite photo, then tap anywhere on it to cover it in kisses!</p>
        </header>

        <!-- Main Canvas Card -->
        <div class="canvas-card">
            
            <!-- Interactive Area -->
            <div class="photo-canvas" id="photoCanvas" onclick="dropKiss(event)">
                <!-- Kisses will be inserted here dynamically -->
            </div>

            <!-- Controls -->
            <div class="canvas-controls">
                <!-- Hidden File Input -->
                <input type="file" id="fileInput" accept="image/*" onchange="loadPhoto(event)">
                
                <button class="control-btn primary-btn" onclick="triggerUpload()">
                    📂 Upload Photo
                </button>
                <button class="control-btn" onclick="clearKisses()">
                    🗑️ Clear Kisses
                </button>
            </div>
            
            <p style="font-size:0.85rem; color:#ffb6c1; margin-top:1rem; opacity:0.8;">(Don't forget to turn up your volume for the 'mwah'!)</p>
        </div>
    </div>

    <!-- Kiss Sound Effect -->
    <audio id="kissSound" src="https://cdn.pixabay.com/audio/2022/03/19/audio_133760b54e.mp3"></audio>

    <script>
        /* --- BACKGROUND CANVAS ANIMATION --- */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            const starCount = Math.floor((width * height) / 3000);
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random(),
                    speed: Math.random() * 0.02 + 0.005,
                    twinkleDir: Math.random() > 0.5 ? 1 : -1
                });
            }
        }

        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, '#0f051d');
            grad.addColorStop(0.5, '#1a0933');
            grad.addColorStop(1, '#090212');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                star.alpha += star.speed * star.twinkleDir;
                if (star.alpha >= 1) { star.alpha = 1; star.twinkleDir = -1; }
                if (star.alpha <= 0.2) { star.alpha = 0.2; star.twinkleDir = 1; }

                ctx.save();
                ctx.globalAlpha = star.alpha;
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#ffb6c1';
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            requestAnimationFrame(drawBackground);
        }

        window.addEventListener('resize', resize);
        resize();
        drawBackground();

        /* --- INTERACTIVE KISS CANVAS LOGIC --- */
        
        const photoCanvas = document.getElementById('photoCanvas');
        const fileInput = document.getElementById('fileInput');
        const kissSound = document.getElementById('kissSound');

        // 1. Upload Photo Logic
        function triggerUpload() {
            fileInput.click();
        }

        function loadPhoto(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    photoCanvas.style.backgroundImage = `url(${e.target.result})`;
                    clearKisses(); // Clear any old kisses when new photo loads
                }
                reader.readAsDataURL(file);
            }
        }

        // 2. Drop Kiss Logic
        function dropKiss(event) {
            // Ensure sound plays even if tapped rapidly
            kissSound.currentTime = 0;
            kissSound.play().catch(()=>{/* Handle autoplay block */});

            // Get click coordinates relative to the photoCanvas container
            const rect = photoCanvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            // Create Kiss Element
            const kiss = document.createElement('span');
            kiss.className = 'kiss-emoji';
            kiss.innerText = '💋';
            kiss.style.left = `${x}px`;
            kiss.style.top = `${y}px`;

            // Random rotation for variety
            const rotation = Math.random() * 40 - 20; // -20 to +20 degrees
            kiss.style.transform += ` rotate(${rotation}deg)`;

            photoCanvas.appendChild(kiss);

            // 3. Auto-remove kiss after animation finishes (1s)
            setTimeout(() => {
                kiss.remove();
            }, 1000);
        }

        // 4. Clear All Kisses Logic
        function clearKisses() {
            const currentKisses = photoCanvas.querySelectorAll('.kiss-emoji');
            currentKisses.forEach(k => k.remove());
        }
    </script>
</body>
</html>
