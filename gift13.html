<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gift #13 — Emotion Shift Maze | Navanshi’s 15th</title>
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <link rel="stylesheet" href="styles.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f051d;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Background Overlay */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .gift-container {
            min-height: 100vh;
            padding: 90px 15px 40px 15px;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-nav {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 100;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 10px 22px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            border-color: rgba(255, 182, 193, 0.6);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
        }

        .page-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .page-badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(156, 39, 176, 0.3), rgba(233, 30, 99, 0.3));
            color: #e040fb;
            border: 1px solid rgba(224, 64, 251, 0.5);
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            box-shadow: 0 0 15px rgba(224, 64, 251, 0.2);
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ffffff, #e040fb, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Game Card Container */
        .game-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 28px;
            padding: 1.5rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            transition: border-color 0.8s ease, box-shadow 0.8s ease;
        }

        /* Status & Timer Bar */
        .status-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 20px;
            border-radius: 18px;
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
            gap: 10px;
        }

        .mood-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .mood-badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.5s ease;
        }

        .timer-info {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
        }

        /* Maze Canvas */
        #mazeCanvas {
            background: #0d061a;
            border-radius: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 100%;
            touch-action: none;
        }

        /* On Screen Controls (Mobile) */
        .touch-controls {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 8px;
            margin-top: 1.2rem;
            justify-content: center;
        }

        .d-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 1.3rem;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .d-btn:active {
            background: rgba(255, 105, 180, 0.5);
        }

        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }

        @media (max-width: 600px) {
            .page-title { font-size: 2rem; }
            .status-bar { justify-content: center; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- Canvas Background -->
    <canvas id="bg-canvas"></canvas>

    <!-- Navigation -->
    <div class="back-nav">
        <a href="index.html" class="glass-btn">
            ← Back to Dashboard
        </a>
    </div>

    <div class="gift-container">
        <header class="page-header">
            <span class="page-badge">Gift #13 • Endless Game</span>
            <h1 class="page-title">Emotion Shift Maze 🌀</h1>
        </header>

        <div class="game-card" id="gameCard">
            <!-- Status Bar -->
            <div class="status-bar">
                <div class="mood-indicator">
                    <span>Mood:</span>
                    <span class="mood-badge" id="moodBadge">HAPPY 😃</span>
                </div>
                <div>Level: <strong id="levelText" style="color:#ffb6c1; font-size:1.2rem;">1</strong></div>
                <div class="timer-info">Next Shift: <span id="timerText" style="color:#ffd700; font-weight:700;">05:00</span></div>
            </div>

            <!-- Game Canvas -->
            <canvas id="mazeCanvas" width="500" height="500"></canvas>

            <!-- Touch D-Pad for Mobile -->
            <div class="touch-controls">
                <button class="d-btn btn-up" onclick="movePlayer(0, -1)">▲</button>
                <button class="d-btn btn-left" onclick="movePlayer(-1, 0)">◀</button>
                <button class="d-btn btn-down" onclick="movePlayer(0, 1)">▼</button>
                <button class="d-btn btn-right" onclick="movePlayer(1, 0)">▶</button>
            </div>
        </div>
    </div>

    <script>
        /* --- BACKGROUND STARFIELD --- */
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let width, height, stars = [];

        function resizeBg() {
            width = bgCanvas.width = window.innerWidth;
            height = bgCanvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2,
                    alpha: Math.random(),
                    speed: Math.random() * 0.02 + 0.005
                });
            }
        }

        function drawBg() {
            bgCtx.fillStyle = '#0f051d';
            bgCtx.fillRect(0, 0, width, height);

            stars.forEach(s => {
                s.alpha += s.speed;
                if(s.alpha > 1) s.alpha = 0;
                bgCtx.fillStyle = `rgba(255, 255, 255, ${Math.sin(s.alpha)})`;
                bgCtx.beginPath();
                bgCtx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                bgCtx.fill();
            });
            requestAnimationFrame(drawBg);
        }

        window.addEventListener('resize', resizeBg);
        resizeBg();
        drawBg();

        /* --- EMOTION SHIFT ENGINE --- */
        const moods = [
            { name: 'HAPPY 😃', emoji: '😃', color: '#ff69b4', aura: 'rgba(255, 105, 180, 0.4)', wallColor: '#e040fb' },
            { name: 'NORMAL 🙂', emoji: '🙂', color: '#4fc3f7', aura: 'rgba(79, 195, 247, 0.4)', wallColor: '#0288d1' },
            { name: 'SAD 😢', emoji: '😢', color: '#7986cb', aura: 'rgba(121, 134, 203, 0.4)', wallColor: '#3f51b5' },
            { name: 'CRYING 😭', emoji: '😭', color: '#64b5f6', aura: 'rgba(100, 181, 246, 0.4)', wallColor: '#1e88e5' },
            { name: 'ANGRI 😡', emoji: '😡', color: '#ff5252', aura: 'rgba(255, 82, 82, 0.4)', wallColor: '#d32f2f' }
        ];

        let currentMoodIdx = 0;
        let shiftTimeRemaining = 300; // 5 minutes in seconds

        function updateMoodUI() {
            const mood = moods[currentMoodIdx];
            const badge = document.getElementById('moodBadge');
            const card = document.getElementById('gameCard');

            badge.innerText = mood.name;
            badge.style.background = mood.aura;
            badge.style.color = mood.color;
            badge.style.border = `1px solid ${mood.color}`;

            card.style.borderColor = mood.color;
            card.style.boxShadow = `0 20px 60px ${mood.aura}`;
            
            drawMaze();
        }

        function shiftMoodNext() {
            currentMoodIdx = (currentMoodIdx + 1) % moods.length;
            shiftTimeRemaining = 300; // Reset timer
            updateMoodUI();
        }

        // Timer Interval
        setInterval(() => {
            shiftTimeRemaining--;
            if (shiftTimeRemaining <= 0) {
                shiftMoodNext();
            }
            const mins = Math.floor(shiftTimeRemaining / 60).toString().padStart(2, '0');
            const secs = (shiftTimeRemaining % 60).toString().padStart(2, '0');
            document.getElementById('timerText').innerText = `${mins}:${secs}`;
        }, 1000);

        /* --- NEVER ENDING MAZE GENERATOR --- */
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');

        const cols = 15;
        const rows = 15;
        const cellSize = canvas.width / cols;

        let grid = [];
        let currentLevel = 1;
        let player = { x: 0, y: 0 };
        let goal = { x: cols - 1, y: rows - 1 };

        class Cell {
            constructor(r, c) {
                this.r = r;
                this.c = c;
                this.walls = [true, true, true, true]; // Top, Right, Bottom, Left
                this.visited = false;
            }

            checkNeighbors() {
                let neighbors = [];
                let top    = grid[index(this.r - 1, this.c)];
                let right  = grid[index(this.r, this.c + 1)];
                let bottom = grid[index(this.r + 1, this.c)];
                let left   = grid[index(this.r, this.c - 1)];

                if (top && !top.visited) neighbors.push(top);
                if (right && !right.visited) neighbors.push(right);
                if (bottom && !bottom.visited) neighbors.push(bottom);
                if (left && !left.visited) neighbors.push(left);

                if (neighbors.length > 0) {
                    let r = Math.floor(Math.random() * neighbors.length);
                    return neighbors[r];
                } else {
                    return undefined;
                }
            }
        }

        function index(r, c) {
            if (r < 0 || c < 0 || r >= rows || c >= cols) return -1;
            return r * cols + c;
        }

        function generateMaze() {
            grid = [];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    grid.push(new Cell(r, c));
                }
            }

            let current = grid[0];
            current.visited = true;
            let stack = [];

            while (true) {
                let next = current.checkNeighbors();
                if (next) {
                    next.visited = true;
                    stack.push(current);
                    removeWalls(current, next);
                    current = next;
                } else if (stack.length > 0) {
                    current = stack.pop();
                } else {
                    break;
                }
            }
            player = { x: 0, y: 0 };
            drawMaze();
        }

        function removeWalls(a, b) {
            let x = a.c - b.c;
            if (x === 1) { a.walls[3] = false; b.walls[1] = false; }
            else if (x === -1) { a.walls[1] = false; b.walls[3] = false; }

            let y = a.r - b.r;
            if (y === 1) { a.walls[0] = false; b.walls[2] = false; }
            else if (y === -1) { a.walls[2] = false; b.walls[0] = false; }
        }

        function drawMaze() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const mood = moods[currentMoodIdx];

            // Draw Walls
            ctx.strokeStyle = mood.wallColor;
            ctx.lineWidth = 3;

            for (let i = 0; i < grid.length; i++) {
                let x = grid[i].c * cellSize;
                let y = grid[i].r * cellSize;

                if (grid[i].walls[0]) { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + cellSize, y); ctx.stroke(); }
                if (grid[i].walls[1]) { ctx.beginPath(); ctx.moveTo(x + cellSize, y); ctx.lineTo(x + cellSize, y + cellSize); ctx.stroke(); }
                if (grid[i].walls[2]) { ctx.beginPath(); ctx.moveTo(x + cellSize, y + cellSize); ctx.lineTo(x, y + cellSize); ctx.stroke(); }
                if (grid[i].walls[3]) { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + cellSize); ctx.stroke(); }
            }

            // Draw Goal (Portal)
            ctx.font = `${cellSize * 0.7}px sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText('🌀', (goal.x + 0.5) * cellSize, (goal.y + 0.5) * cellSize);

            // Draw Character (Player)
            ctx.fillText(mood.emoji, (player.x + 0.5) * cellSize, (player.y + 0.5) * cellSize);
        }

        /* --- PLAYER MOVEMENT LOGIC --- */
        function movePlayer(dx, dy) {
            let currentCell = grid[index(player.y, player.x)];

            if (dx === 0 && dy === -1 && !currentCell.walls[0]) player.y--;
            if (dx === 1 && dy === 0 && !currentCell.walls[1]) player.x++;
            if (dx === 0 && dy === 1 && !currentCell.walls[2]) player.y++;
            if (dx === -1 && dy === 0 && !currentCell.walls[3]) player.x--;

            drawMaze();

            // Check Win Condition
            if (player.x === goal.x && player.y === goal.y) {
                currentLevel++;
                document.getElementById('levelText').innerText = currentLevel;
                
                confetti({ particleCount: 80, spread: 60, origin: { y: 0.6 } });
                
                // Shift mood every 2 levels as a bonus reward
                if (currentLevel % 2 === 0) shiftMoodNext();
                
                generateMaze();
            }
        }

        // Keyboard Controls
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' || e.key === 'w') movePlayer(0, -1);
            if (e.key === 'ArrowDown' || e.key === 's') movePlayer(0, 1);
            if (e.key === 'ArrowLeft' || e.key === 'a') movePlayer(-1, 0);
            if (e.key === 'ArrowRight' || e.key === 'd') movePlayer(1, 0);
        });

        // Initialize Game
        window.onload = () => {
            updateMoodUI();
            generateMaze();
        };
    </script>
</body>
</html>
