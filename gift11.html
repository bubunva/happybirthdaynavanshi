<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gift #11 — Wheel of Surprises 🎡 | Navanshi’s 15th</title>
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Reuse Main Glassmorphism Stylesheet -->
    <link rel="stylesheet" href="styles.css">

    <style>
        .gift-page-container {
            min-height: 100vh;
            padding: 100px 20px 80px 20px;
            max-width: 850px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-badge {
            display: inline-block;
            background: rgba(233, 30, 99, 0.15);
            color: var(--color-cherry-pink);
            border: 1px solid rgba(233, 30, 99, 0.3);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
        }

        .page-title {
            font-family: var(--font-serif);
            font-size: 2.8rem;
            color: var(--color-dark-cherry);
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            font-size: 1.05rem;
            color: var(--color-deep-cherry);
            opacity: 0.85;
        }

        /* Wheel Main Wrapper */
        .wheel-card {
            background: var(--glass-bg-primary);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--glass-border-light);
            border-radius: 32px;
            padding: 2.5rem 2rem;
            box-shadow: var(--shadow-retina-lg);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 1.5rem 0;
        }

        /* Pointer Marker */
        .wheel-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid var(--color-cherry-pink);
            z-index: 10;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        /* Wheel Canvas */
        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid var(--color-pure-white);
            box-shadow: 0 12px 35px rgba(233, 30, 99, 0.25);
            transition: transform 4s cubic-bezier(0.15, 0.9, 0.2, 1);
        }

        .spin-btn {
            background: linear-gradient(135deg, var(--color-cherry-pink), var(--color-dark-cherry));
            color: #fff;
            border: none;
            padding: 14px 38px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(233, 30, 99, 0.35);
            transition: all 0.3s var(--transition-apple-spring);
            margin-top: 1rem;
        }

        .spin-btn:hover {
            transform: scale(1.06);
            box-shadow: 0 12px 30px rgba(233, 30, 99, 0.5);
        }

        .spin-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Result Display Box */
        .result-box {
            margin-top: 1.5rem;
            padding: 1rem 1.5rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid var(--glass-border-light);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--color-dark-cherry);
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 450px;
            transition: all 0.3s ease;
        }

        .back-nav {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 100;
        }

        @media (max-width: 600px) {
            .page-title { font-size: 2.1rem; }
            .wheel-container { width: 270px; height: 270px; }
        }
    </style>
</head>
<body>

    <!-- Canvas Background -->
    <canvas id="ambient-canvas"></canvas>

    <!-- Glowing Orbs -->
    <div class="ambient-glows" aria-hidden="true">
        <div class="orb orb-pale"></div>
        <div class="orb orb-cherry"></div>
        <div class="orb orb-white"></div>
    </div>

    <!-- Back Button -->
    <div class="back-nav">
        <a href="index.html" class="ios-glass-btn secondary" style="padding: 10px 20px; font-size: 0.9rem;">
            ← Back to Dashboard
        </a>
    </div>

    <div class="gift-page-container">
        <header class="page-header">
            <span class="page-badge">Gift #11 • Secret Bonus</span>
            <h1 class="page-title">Wheel of Surprises 🎡</h1>
            <p class="page-subtitle">Give the wheel a spin to reveal your instant birthday reward!</p>
        </header>

        <div class="wheel-card">
            <div class="wheel-container">
                <div class="wheel-pointer"></div>
                <canvas id="wheelCanvas" width="500" height="500"></canvas>
            </div>

            <button class="spin-btn" id="spinBtn" onclick="spinWheel()">
                ✨ SPIN THE WHEEL!
            </button>

            <div class="result-box" id="resultDisplay">
                Tap the button above to spin for a surprise!
            </div>
        </div>
    </div>

    <!-- Script connection -->
    <script src="script.js"></script>

    <script>
        const prizes = [
            { label: "🍰 Extra Cake", color: "#FFB7B2" },
            { label: "👑 Queen's Praise", color: "#FFDAC1" },
            { label: "🍦 Ice Cream Pass", color: "#E2F0CB" },
            { label: "🍿 Movie Pick", color: "#B5EAD7" },
            { label: "🎵 DJ Request", color: "#C7CEEA" },
            { label: "✨ Unlimited Hugs", color: "#F6A6FF" },
            { label: "🧹 Skip 1 Chore", color: "#FF9AA2" },
            { label: "💖 VIP Compliment", color: "#FFC6FF" }
        ];

        let currentRotation = 0;
        let isSpinning = false;

        document.addEventListener("DOMContentLoaded", () => {
            drawWheel();
        });

        function drawWheel() {
            const canvas = document.getElementById("wheelCanvas");
            const ctx = canvas.getContext("2d");
            const numSlices = prizes.length;
            const sliceAngle = (2 * Math.PI) / numSlices;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < numSlices; i++) {
                const angle = i * sliceAngle;

                // Draw Slice
                ctx.beginPath();
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, angle, angle + sliceAngle);
                ctx.closePath();
                ctx.fillStyle = prizes[i].color;
                ctx.fill();
                ctx.lineWidth = 3;
                ctx.strokeStyle = "#ffffff";
                ctx.stroke();

                // Draw Text
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(angle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#4A1525";
                ctx.font = "bold 20px 'Inter', sans-serif";
                ctx.fillText(prizes[i].label, 220, 8);
                ctx.restore();
            }
        }

        function spinWheel() {
            if (isSpinning) return;

            isSpinning = true;
            const spinBtn = document.getElementById("spinBtn");
            const resultDisplay = document.getElementById("resultDisplay");
            const wheelCanvas = document.getElementById("wheelCanvas");

            spinBtn.disabled = true;
            resultDisplay.innerText = "Spinning... Good luck! 🎯";

            // Random rotation (between 5 and 8 full spins + random slice offset)
            const numSlices = prizes.length;
            const sliceAngle = 360 / numSlices;
            const winningIndex = Math.floor(Math.random() * numSlices);
            
            // Pointer is at the top (270 deg / -90 deg), so we calculate target angle
            const targetAngle = 360 * 6 + (360 - (winningIndex * sliceAngle) - (sliceAngle / 2));
            currentRotation += targetAngle;

            wheelCanvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                spinBtn.disabled = false;
                const wonPrize = prizes[winningIndex].label;

                resultDisplay.innerText = `🎉 You Won: ${wonPrize}!`;
                resultDisplay.style.color = "var(--color-cherry-pink)";

                if (typeof triggerConfettiBurst === "function") {
                    triggerConfettiBurst();
                }
            }, 4000); // Matches CSS transition duration
        }
    </script>
</body>
</html>
