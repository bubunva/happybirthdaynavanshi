<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gift #2 — Golden Memories (169 Photos) | Navanshi’s 15th</title>
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f051d;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Star & Wave Canvas Background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .gift-container {
            min-height: 100vh;
            padding: 100px 20px 80px 20px;
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-nav {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 100;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 10px 22px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            border-color: rgba(255, 182, 193, 0.6);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(255, 105, 180, 0.3), rgba(233, 30, 99, 0.3));
            color: #ffb6c1;
            border: 1px solid rgba(255, 182, 193, 0.4);
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.2);
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            background: linear-gradient(135deg, #ffffff, #ffb6c1, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            font-size: 1.05rem;
            color: #fce4ec;
            opacity: 0.85;
        }

        /* Photo Grid */
        .meme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
            width: 100%;
        }

        .meme-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 192, 203, 0.25);
            border-radius: 20px;
            padding: 0.8rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .meme-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(255, 105, 180, 0.6);
            box-shadow: 0 20px 45px rgba(255, 105, 180, 0.25);
        }

        .meme-img-container {
            width: 100%;
            height: 200px;
            border-radius: 14px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }

        .meme-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .meme-card:hover .meme-img-container img {
            transform: scale(1.08);
        }

        .meme-placeholder-text {
            color: #ffb6c1;
            font-size: 0.95rem;
            font-weight: 600;
            text-align: center;
            padding: 1rem;
        }

        .meme-caption {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            color: #fff;
            margin: 0.8rem 0 0.5rem 0;
            font-weight: 600;
            text-align: center;
        }

        /* Reaction Bar */
        .reaction-bar {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 0.6rem;
            margin-top: auto;
        }

        .react-btn {
            background: transparent;
            border: none;
            color: #ffb6c1;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.2s ease, background 0.2s ease;
            padding: 4px 8px;
            border-radius: 12px;
        }

        .react-btn:hover {
            transform: scale(1.15);
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Lightbox Modal with Smooth Transition */
        .lightbox-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 5, 29, 0.95);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lightbox-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(255, 105, 180, 0.4);
            border: 2px solid rgba(255, 182, 193, 0.5);
            object-fit: contain;
            transform: scale(0.92);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .lightbox-modal.active .lightbox-content {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #fff;
            font-size: 2.5rem;
            cursor: pointer;
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .lightbox-close:hover {
            transform: scale(1.2) rotate(90deg);
            color: #ff69b4;
        }

        @media (max-width: 600px) {
            .page-title { font-size: 2.1rem; }
            .meme-img-container { height: 170px; }
            .meme-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
        }
    </style>
</head>
<body>

    <!-- Starfield & Waves Canvas Background -->
    <canvas id="bg-canvas"></canvas>

    <!-- Navigation -->
    <div class="back-nav">
        <a href="index.html" class="glass-btn">
            ← Back to Dashboard
        </a>
    </div>

    <div class="gift-container">
        <header class="page-header">
            <span class="page-badge">Gift #2 • Golden Memories</span>
            <h1 class="page-title">169 Special Moments 📸</h1>
            <p class="page-subtitle">A collection of 169 beautiful memories curated for Navanshi’s 15th Birthday!</p>
        </header>

        <!-- 169 Photos Grid -->
        <div class="meme-grid" id="memeGrid"></div>
    </div>

    <!-- Fullscreen Lightbox -->
    <div class="lightbox-modal" id="lightboxModal" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightboxImg" src="" alt="Zoomed Memory">
    </div>

    <script>
        /* --- STARS & WAVE CANVAS ANIMATION --- */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let width, height, stars = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            const starCount = Math.floor((width * height) / 3000);
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random(),
                    speed: Math.random() * 0.02 + 0.005,
                    twinkleDir: Math.random() > 0.5 ? 1 : -1
                });
            }
        }

        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, '#0f051d');
            grad.addColorStop(0.5, '#1a0933');
            grad.addColorStop(1, '#090212');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                star.alpha += star.speed * star.twinkleDir;
                if (star.alpha >= 1) { star.alpha = 1; star.twinkleDir = -1; }
                if (star.alpha <= 0.2) { star.alpha = 0.2; star.twinkleDir = 1; }

                ctx.save();
                ctx.globalAlpha = star.alpha;
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#ffb6c1';
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            const time = Date.now() * 0.001;
            drawWave(time, 0.002, 40, '#ff1493', 0.08);
            drawWave(time + 2, 0.003, 30, '#8a2be2', 0.06);

            requestAnimationFrame(drawBackground);
        }

        function drawWave(time, speed, amplitude, color, alpha) {
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(0, height * 0.7);
            for (let x = 0; x <= width; x += 10) {
                const y = Math.sin(x * speed + time) * amplitude + Math.cos(x * 0.001 + time) * (amplitude / 2) + (height * 0.7);
                ctx.lineTo(x, y);
            }
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.globalAlpha = alpha;
            ctx.fill();
            ctx.restore();
        }

        window.addEventListener('resize', resize);
        resize();
        drawBackground();

        /* --- DYNAMICALLY GENERATE ALL 169 PHOTOS FROM "Nav Pic" FOLDER --- */
        const memeGrid = document.getElementById("memeGrid");
        const totalPhotos = 169;

        for (let i = 1; i <= totalPhotos; i++) {
            const card = document.createElement("div");
            card.className = "meme-card";
            // Stagger animation delay slightly for cascading appearance
            card.style.animationDelay = `${(i % 20) * 0.03}s`;

            const fileName = `Nav Pic/p (${i}).jpg`;
            const title = `Memory #${i}`;

            card.innerHTML = `
                <div class="meme-img-container" onclick="openLightbox('${fileName}', '${title}')">
                    <img src="${fileName}" alt="${title}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="meme-placeholder-text" style="display:none;">
                        📷<br>${title}<br><span style="font-size:0.75rem; font-weight:normal;">(Missing file)</span>
                    </div>
                </div>
                <div class="meme-caption">${title}</div>
                <div class="reaction-bar">
                    <button class="react-btn" onclick="reactMeme(this, '❤️')">❤️ <span class="count">0</span></button>
                    <button class="react-btn" onclick="reactMeme(this, '✨')">✨ <span class="count">0</span></button>
                </div>
            `;

            memeGrid.appendChild(card);
        }

        /* --- LIGHTBOX & REACTIONS --- */
        function openLightbox(imgSrc, title) {
            const modal = document.getElementById("lightboxModal");
            const img = document.getElementById("lightboxImg");
            img.src = imgSrc;
            modal.classList.add("active");
        }

        function closeLightbox() {
            document.getElementById("lightboxModal").classList.remove("active");
        }

        function reactMeme(btn, emoji) {
            const countElem = btn.querySelector('.count');
            countElem.innerText = parseInt(countElem.innerText) + 1;
            
            // Pop floating emoji animation
            const pop = document.createElement("span");
            pop.innerText = emoji;
            pop.style.position = "fixed";
            const rect = btn.getBoundingClientRect();
            pop.style.left = `${rect.left + 10}px`;
            pop.style.top = `${rect.top - 10}px`;
            pop.style.fontSize = "1.5rem";
            pop.style.pointerEvents = "none";
            pop.style.transition = "all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
            pop.style.zIndex = "999";
            document.body.appendChild(pop);

            setTimeout(() => {
                pop.style.transform = "translateY(-50px) scale(1.4)";
                pop.style.opacity = "0";
            }, 50);

            setTimeout(() => { pop.remove(); }, 850);
        }
    </script>
</body>
</html>
