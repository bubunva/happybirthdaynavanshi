<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gift #2 — Golden Memories (169 Photos) | Navanshi’s 15th</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f051d;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .gift-container {
            min-height: 100vh;
            padding: 100px 20px 80px 20px;
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-nav {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 100;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 10px 22px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            border-color: rgba(255, 182, 193, 0.6);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(255, 105, 180, 0.3), rgba(233, 30, 99, 0.3));
            color: #ffb6c1;
            border: 1px solid rgba(255, 182, 193, 0.4);
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.2);
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            background: linear-gradient(135deg, #ffffff, #ffb6c1, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            font-size: 1.05rem;
            color: #fce4ec;
            opacity: 0.85;
        }

        .meme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
            width: 100%;
        }

        .meme-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 192, 203, 0.25);
            border-radius: 20px;
            padding: 0.8rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .meme-img-container {
            width: 100%;
            height: 200px;
            border-radius: 14px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }

        .meme-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .meme-caption {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            color: #fff;
            margin: 0.8rem 0 0.5rem 0;
            font-weight: 600;
            text-align: center;
        }

        .reaction-bar {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 0.6rem;
            margin-top: auto;
        }

        .react-btn {
            background: transparent;
            border: none;
            color: #ffb6c1;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 8px;
            border-radius: 12px;
        }

        .lightbox-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 5, 29, 0.95);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .lightbox-modal.active {
            display: flex;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 20px;
            border: 2px solid rgba(255, 182, 193, 0.5);
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #fff;
            font-size: 2.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="back-nav">
        <a href="index.html" class="glass-btn">← Back to Dashboard</a>
    </div>

    <div class="gift-container">
        <header class="page-header">
            <span class="page-badge">Gift #2 • Golden Memories</span>
            <h1 class="page-title">169 Special Moments 📸</h1>
            <p class="page-subtitle">A collection of 169 beautiful memories curated for Navanshi’s 15th Birthday!</p>
        </header>

        <div class="meme-grid">
            <!-- HARDCODED HTML FOR ALL 169 IMAGES SO NO JAVASCRIPT LOOP FAILS OR SKIPS -->
            <script>
                const grid = document.currentScript.parentElement;
                let htmlContent = "";
                for (let i = 1; i <= 169; i++) {
                    htmlContent += `
                        <div class="meme-card">
                            <div class="meme-img-container" onclick="openLightbox('p (${i}).png', 'Memory #${i}')">
                                <img src="p (${i}).png" alt="Memory #${i}" loading="lazy">
                            </div>
                            <div class="meme-caption">Memory #${i}</div>
                            <div class="reaction-bar">
                                <button class="react-btn" onclick="reactMeme(this, '❤️')">❤️ <span class="count">0</span></button>
                                <button class="react-btn" onclick="reactMeme(this, '✨')">✨ <span class="count">0</span></button>
                            </div>
                        </div>
                    `;
                }
                grid.innerHTML = htmlContent;
            </script>
        </div>
    </div>

    <div class="lightbox-modal" id="lightboxModal" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightboxImg" src="" alt="Zoomed Memory">
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random(),
                    speed: Math.random() * 0.02 + 0.005
                });
            }
        }

        function draw() {
            ctx.fillStyle = '#0f051d';
            ctx.fillRect(0, 0, width, height);
            stars.forEach(s => {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        resize();
        draw();

        function openLightbox(src, title) {
            document.getElementById("lightboxImg").src = src;
            document.getElementById("lightboxModal").classList.add("active");
        }

        function closeLightbox() {
            document.getElementById("lightboxModal").classList.remove("active");
        }

        function reactMeme(btn, emoji) {
            const countElem = btn.querySelector('.count');
            countElem.innerText = parseInt(countElem.innerText) + 1;
        }
    </script>
</body>
</html>
