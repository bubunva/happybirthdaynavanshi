<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gift #2 — 15 Custom Memes 😂 | Navanshi’s 15th</title>
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Reuse Main Glassmorphism Stylesheet -->
    <link rel="stylesheet" href="styles.css">

    <style>
        .gift-page-container {
            min-height: 100vh;
            padding: 100px 20px 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-badge {
            display: inline-block;
            background: rgba(233, 30, 99, 0.1);
            color: var(--color-cherry-pink);
            border: 1px solid rgba(233, 30, 99, 0.2);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
        }

        .page-title {
            font-family: var(--font-serif);
            font-size: 2.8rem;
            color: var(--color-dark-cherry);
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            font-size: 1.05rem;
            color: var(--color-deep-cherry);
            opacity: 0.85;
        }

        /* Meme Grid */
        .meme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.8rem;
        }

        .meme-card {
            background: var(--glass-bg-primary);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid var(--glass-border-light);
            border-radius: 24px;
            padding: 1.2rem;
            box-shadow: var(--shadow-retina-sm);
            cursor: pointer;
            transition: all 0.4s var(--transition-apple-spring);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .meme-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-retina-lg);
            border-color: var(--glass-border-glow);
            background: var(--glass-bg-hover);
        }

        .meme-img-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            position: relative;
        }

        .meme-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .meme-card:hover .meme-img-container img {
            transform: scale(1.08);
        }

        .meme-placeholder-icon {
            font-size: 3rem;
            opacity: 0.6;
        }

        .meme-caption {
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--color-dark-cherry);
            text-align: center;
            line-height: 1.4;
        }

        .meme-number {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--color-cherry-pink);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
        }

        /* Lightbox Overlay */
        .lightbox-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(40, 20, 28, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .lightbox-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-card {
            background: var(--glass-bg-solid);
            border: 1px solid var(--glass-border-light);
            border-radius: 32px;
            max-width: 550px;
            width: 100%;
            padding: 2rem;
            box-shadow: var(--shadow-retina-lg);
            text-align: center;
            position: relative;
            transform: scale(0.85);
            transition: transform 0.4s var(--transition-apple-spring);
        }

        .lightbox-modal.active .lightbox-card {
            transform: scale(1);
        }

        .lightbox-img-wrapper {
            width: 100%;
            max-height: 380px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 1.2rem;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-img-wrapper img {
            max-width: 100%;
            max-height: 380px;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.08);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            color: var(--color-dark-cherry);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .lightbox-close:hover {
            background: var(--color-cherry-pink);
            color: #fff;
        }

        .back-nav {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 100;
        }

        @media (max-width: 600px) {
            .page-title { font-size: 2rem; }
            .meme-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
            .meme-card { padding: 0.8rem; }
        }
    </style>
</head>
<body>

    <!-- Canvas Background -->
    <canvas id="ambient-canvas"></canvas>

    <!-- Glowing Orbs -->
    <div class="ambient-glows" aria-hidden="true">
        <div class="orb orb-pale"></div>
        <div class="orb orb-cherry"></div>
        <div class="orb orb-white"></div>
    </div>

    <!-- Back Button -->
    <div class="back-nav">
        <a href="index.html" class="ios-glass-btn secondary" style="padding: 10px 20px; font-size: 0.9rem;">
            ← Back to Dashboard
        </a>
    </div>

    <!-- Main Gallery Experience -->
    <div class="gift-page-container">
        <header class="page-header">
            <span class="page-badge">Gift #2 • Chapter Fifteen</span>
            <h1 class="page-title">15 Memes for Navanshi 😂</h1>
            <p class="page-subtitle">Handcrafted memes for all our inside jokes. Tap any card to enlarge!</p>
        </header>

        <!-- 15 Memes Grid -->
        <div class="meme-grid" id="memeGrid">
            <!-- Dynamically populated by JS below -->
        </div>
    </div>

    <!-- Lightbox Pop-up Modal -->
    <div class="lightbox-modal" id="lightboxModal">
        <div class="lightbox-card">
            <button class="lightbox-close" id="lightboxClose">&times;</button>
            <div class="lightbox-img-wrapper" id="lightboxImgWrapper">
                <!-- Enlarged image or emoji inserted here -->
            </div>
            <div class="meme-number" id="lightboxNum">Meme #1</div>
            <div class="meme-caption" id="lightboxCaption">Meme caption goes here</div>
        </div>
    </div>

    <!-- Load Canvas Script -->
    <script src="script.js"></script>

    <script>
        // 15 Custom Memes Data
        // REPLACE image paths (e.g., "images/meme1.jpg") with your actual meme images!
        const MEMES_DATA = [
            { id: 1, title: "When Navanshi starts overthinking simple things", image: "images/meme1.jpg", emoji: "🤪" },
            { id: 2, title: "Navanshi trying to decide what to eat", image: "images/meme2.jpg", emoji: "🍕" },
            { id: 3, title: "That specific look she gives when I say something silly", image: "images/meme3.jpg", emoji: "👀" },
            { id: 4, title: "When she claims she isn't sleepy at 2 AM", image: "images/meme4.jpg", emoji: "🥱" },
            { id: 5, title: "Navanshi winning every argument effortlessly", image: "images/meme5.jpg", emoji: "👑" },
            { id: 6, title: "How fast she replies when she actually wants to chat", image: "images/meme6.jpg", emoji: "⚡" },
            { id: 7, title: "When her favorite song comes on in public", image: "images/meme7.jpg", emoji: "🎵" },
            { id: 8, title: "Navanshi pretending to listen to advice", image: "images/meme8.jpg", emoji: "😇" },
            { id: 9, title: "Me explaining a joke for the 3rd time", image: "images/meme9.jpg", emoji: "🤦‍♂️" },
            { id: 10, title: "When someone says Navanshi isn't the cutest 15yo", image: "images/meme10.jpg", emoji: "😤" },
            { id: 11, title: "Navanshi entering her 15th year like a boss", image: "images/meme11.jpg", emoji: "✨" },
            { id: 12, title: "Her reaction when I send a terrible meme", image: "images/meme12.jpg", emoji: "💀" },
            { id: 13, title: "When we spend hours talking about absolutely nothing", image: "images/meme13.jpg", emoji: "💬" },
            { id: 14, title: "Navanshi's mood changes within 5 seconds", image: "images/meme14.jpg", emoji: "🎭" },
            { id: 15, title: "Me realizing I get to celebrate 15 with her!", image: "images/meme15.jpg", emoji: "🎉" }
        ];

        document.addEventListener("DOMContentLoaded", () => {
            const grid = document.getElementById("memeGrid");
            const modal = document.getElementById("lightboxModal");
            const closeBtn = document.getElementById("lightboxClose");
            const imgWrapper = document.getElementById("lightboxImgWrapper");
            const numEl = document.getElementById("lightboxNum");
            const captionEl = document.getElementById("lightboxCaption");

            // Render 15 Meme Cards
            MEMES_DATA.forEach(meme => {
                const card = document.createElement("div");
                card.className = "meme-card";
                card.innerHTML = `
                    <div class="meme-img-container">
                        <!-- Fallback to Emoji icon if image file isn't uploaded yet -->
                        <img src="${meme.image}" alt="Meme #${meme.id}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                        <span class="meme-placeholder-icon" style="display:none;">${meme.emoji}</span>
                    </div>
                    <div class="meme-number">Meme #${meme.id}</div>
                    <div class="meme-caption">${meme.title}</div>
                `;

                // Open Lightbox on click
                card.addEventListener("click", () => {
                    numEl.innerText = `Meme #${meme.id}`;
                    captionEl.innerText = meme.title;
                    
                    imgWrapper.innerHTML = `
                        <img src="${meme.image}" alt="Meme #${meme.id}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                        <span style="display:none; font-size:6rem;">${meme.emoji}</span>
                    `;

                    modal.classList.add("active");
                    if (typeof triggerConfettiBurst === "function") triggerConfettiBurst();
                });

                grid.appendChild(card);
            });

            // Close Lightbox
            const closeModal = () => modal.classList.remove("active");
            closeBtn.addEventListener("click", closeModal);
            modal.addEventListener("click", (e) => {
                if (e.target === modal) closeModal();
            });
        });
    </script>
</body>
</html>
