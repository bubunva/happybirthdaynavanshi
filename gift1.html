<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gift #1 — A Special Letter | Navanshi’s 15th</title>
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f051d;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Star & Wave Canvas Background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .gift-container {
            min-height: 100vh;
            padding: 100px 20px 80px 20px;
            max-width: 850px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-nav {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 100;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 10px 22px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            border-color: rgba(255, 182, 193, 0.6);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
        }

        /* Letter Glass Card */
        .letter-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            border: 1px solid rgba(255, 192, 203, 0.3);
            border-radius: 32px;
            padding: 3.5rem 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(255, 182, 193, 0.1);
            width: 100%;
            position: relative;
            animation: cardFloat 6s ease-in-out infinite alternate;
        }

        @keyframes cardFloat {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-8px); }
        }

        .letter-badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(255, 105, 180, 0.3), rgba(233, 30, 99, 0.3));
            color: #ffb6c1;
            border: 1px solid rgba(255, 182, 193, 0.4);
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.2);
        }

        .letter-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            background: linear-gradient(135deg, #ffffff, #ffb6c1, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            line-height: 1.2;
        }

        /* Animated Text Container */
        .letter-body {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            line-height: 2;
            color: #fce4ec;
            white-space: pre-wrap;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            min-height: 200px;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background-color: #ff69b4;
            margin-left: 4px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (max-width: 600px) {
            .letter-card { padding: 2rem 1.5rem; }
            .letter-title { font-size: 2rem; }
            .letter-body { font-size: 1.05rem; line-height: 1.8; }
        }
    </style>
</head>
<body>

    <!-- Starfield & Waves Canvas Background -->
    <canvas id="bg-canvas"></canvas>

    <!-- Navigation -->
    <div class="back-nav">
        <a href="index.html" class="glass-btn">
            ← Back to Dashboard
        </a>
    </div>

    <div class="gift-container">
        <div class="letter-card">
            <span class="letter-badge">Gift #1 • Letter From Me</span>
            <h1 class="letter-title">Dearest Navanshi ✨</h1>
            
            <div class="letter-body" id="letterText"></div><span class="cursor" id="cursor"></span>
        </div>
    </div>

    <script>
        /* --- STARS & WAVE CANVAS ANIMATION --- */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let stars = [];
        let waves = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            const starCount = Math.floor((width * height) / 3000);
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random(),
                    speed: Math.random() * 0.02 + 0.005,
                    twinkleDir: Math.random() > 0.5 ? 1 : -1
                });
            }
        }

        function drawBackground() {
            // Dark gradient background
            const grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, '#0f051d');
            grad.addColorStop(0.5, '#1a0933');
            grad.addColorStop(1, '#090212');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            // Draw Twinkling Stars
            stars.forEach(star => {
                star.alpha += star.speed * star.twinkleDir;
                if (star.alpha >= 1) { star.alpha = 1; star.twinkleDir = -1; }
                if (star.alpha <= 0.2) { star.alpha = 0.2; star.twinkleDir = 1; }

                ctx.save();
                ctx.globalAlpha = star.alpha;
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#ffb6c1';
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            // Draw Cosmic Glowing Waves
            const time = Date.now() * 0.001;
            drawWave(time, 0.002, 40, '#ff1493', 0.08);
            drawWave(time + 2, 0.003, 30, '#8a2be2', 0.06);
            drawWave(time + 4, 0.0015, 50, '#ffb6c1', 0.05);

            requestAnimationFrame(drawBackground);
        }

        function drawWave(time, speed, amplitude, color, alpha) {
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(0, height * 0.7);

            for (let x = 0; x <= width; x += 10) {
                const y = Math.sin(x * speed + time) * amplitude + Math.cos(x * 0.001 + time) * (amplitude / 2) + (height * 0.7);
                ctx.lineTo(x, y);
            }

            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.closePath();

            ctx.fillStyle = color;
            ctx.globalAlpha = alpha;
            ctx.fill();
            ctx.restore();
        }

        window.addEventListener('resize', resize);
        resize();
        drawBackground();


        /* --- TYPEWRITER LETTER REVEAL --- */
        const fullLetter = `[TYPE YOUR FIRST LETTER HERE]

Dear Navanshi,

Happy 15th Birthday! Today is all about celebrating you and how wonderful you are.

I built this entire experience for you, token by token, memory by memory. Every single gift in this 15-chapter gallery was designed to bring a smile to your face.

Thank you for being such an extraordinary person in my life. I hope this 15th year brings you endless laughter, joy, and unforgettable moments.

With all my heart,
[TYPE YOUR NAME HERE]`;

        let charIndex = 0;
        const letterElem = document.getElementById("letterText");
        const cursorElem = document.getElementById("cursor");

        function typeLetter() {
            if (charIndex < fullLetter.length) {
                letterElem.textContent += fullLetter.charAt(charIndex);
                charIndex++;
                setTimeout(typeLetter, 35);
            } else {
                cursorElem.style.display = 'none';
            }
        }

        // Start typing effect on load
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(typeLetter, 500);
        });
    </script>
</body>
</html>
