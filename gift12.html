<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gift #12 — Photo Slideshow | Navanshi’s 15th</title>
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <link rel="stylesheet" href="styles.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f051d;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Starfield Canvas Background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .gift-container {
            min-height: 100vh;
            padding: 100px 20px 80px 20px;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-nav {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 100;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 10px 22px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            border-color: rgba(255, 182, 193, 0.6);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
        }

        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(255, 105, 180, 0.3), rgba(156, 39, 176, 0.3));
            color: #ffb6c1;
            border: 1px solid rgba(255, 182, 193, 0.5);
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.2);
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            background: linear-gradient(135deg, #ffffff, #ffb6c1, #e040fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            font-size: 1.05rem;
            color: #fce4ec;
            opacity: 0.85;
        }

        /* Slideshow Card */
        .slideshow-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(35px) saturate(180%);
            -webkit-backdrop-filter: blur(35px) saturate(180%);
            border: 1px solid rgba(255, 182, 193, 0.35);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Main Image Container */
        .stage-box {
            width: 100%;
            height: 480px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .stage-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease;
        }

        /* Nav Arrows overlay */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 1.5rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .nav-arrow:hover {
            background: rgba(255, 105, 180, 0.7);
            border-color: #ff69b4;
            transform: translateY(-50%) scale(1.1);
        }

        .arrow-left { left: 15px; }
        .arrow-right { right: 15px; }

        /* Caption Styling */
        .caption-box {
            margin-top: 1.2rem;
            text-align: center;
            min-height: 50px;
        }

        .caption-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: #ffb6c1;
        }

        .caption-sub {
            font-size: 0.95rem;
            color: #fce4ec;
            opacity: 0.85;
            margin-top: 0.3rem;
        }

        /* Controls Bar */
        .controls-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 1.2rem;
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .ctrl-btn:hover {
            background: rgba(255, 105, 180, 0.3);
            border-color: #ff69b4;
        }

        /* Thumbnails Grid */
        .thumbs-grid {
            display: flex;
            gap: 10px;
            margin-top: 1.5rem;
            overflow-x: auto;
            width: 100%;
            padding: 10px 0;
            justify-content: center;
        }

        .thumb-item {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid transparent;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .thumb-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumb-item.active {
            border-color: #ff69b4;
            opacity: 1;
            transform: scale(1.08);
            box-shadow: 0 0 12px rgba(255, 105, 180, 0.6);
        }

        @media (max-width: 600px) {
            .page-title { font-size: 2.1rem; }
            .stage-box { height: 320px; }
            .slideshow-card { padding: 1.2rem; }
            .thumbs-grid { justify-content: flex-start; }
        }
    </style>
</head>
<body>

    <!-- Starfield Background Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Navigation -->
    <div class="back-nav">
        <a href="index.html" class="glass-btn">
            ← Back to Dashboard
        </a>
    </div>

    <div class="gift-container">
        <header class="page-header">
            <span class="page-badge">Gift #12 • Photo Gallery</span>
            <h1 class="page-title">My Photo Slideshow 📸</h1>
            <p class="page-subtitle">A collection of photos of me, made just for you!</p>
        </header>

        <div class="slideshow-card">
            
            <!-- Main Stage -->
            <div class="stage-box">
                <button class="nav-arrow arrow-left" onclick="prevSlide()">❮</button>
                <img id="mainImage" src="" alt="Slideshow Image">
                <button class="nav-arrow arrow-right" onclick="nextSlide()">❯</button>
            </div>

            <!-- Caption -->
            <div class="caption-box">
                <div class="caption-title" id="captionTitle">Photo #1</div>
                <div class="caption-sub" id="captionSub">Loading photo...</div>
            </div>

            <!-- Auto-play Controls -->
            <div class="controls-bar">
                <button class="ctrl-btn" id="playPauseBtn" onclick="togglePlay()">Pause Auto-Play ⏸️</button>
            </div>

            <!-- Thumbnails -->
            <div class="thumbs-grid" id="thumbsGrid">
                <!-- Inserted by JS -->
            </div>

        </div>
    </div>

    <script>
        /* --- BACKGROUND CANVAS ANIMATION --- */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            const starCount = Math.floor((width * height) / 3000);
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random(),
                    speed: Math.random() * 0.02 + 0.005,
                    twinkleDir: Math.random() > 0.5 ? 1 : -1
                });
            }
        }

        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, '#0f051d');
            grad.addColorStop(0.5, '#1a0933');
            grad.addColorStop(1, '#090212');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                star.alpha += star.speed * star.twinkleDir;
                if (star.alpha >= 1) { star.alpha = 1; star.twinkleDir = -1; }
                if (star.alpha <= 0.2) { star.alpha = 0.2; star.twinkleDir = 1; }

                ctx.save();
                ctx.globalAlpha = star.alpha;
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#ffb6c1';
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            requestAnimationFrame(drawBackground);
        }

        window.addEventListener('resize', resize);
        resize();
        drawBackground();

        /* --- SLIDESHOW DATA & LOGIC --- */

        // ADD OR EDIT YOUR PHOTOS HERE:
        // Make sure to add your photo files to your project folder (e.g. photo1.jpg, photo2.jpg, etc.)
        const photos = [
            {
                src: 'photo1.jpg',
                fallback: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=800&q=80',
                title: 'Smiling For You 😊',
                caption: 'Just a picture to bring a smile to your face today!'
            },
            {
                src: 'photo2.jpg',
                fallback: 'https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=800&q=80',
                title: 'Golden Hour ✨',
                caption: 'Thinking of you whenever the sun sets.'
            },
            {
                src: 'photo3.jpg',
                fallback: 'https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=800&q=80',
                title: 'Best Memories 📸',
                caption: 'Every moment shared with you is my favorite.'
            },
            {
                src: 'photo4.jpg',
                fallback: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=800&q=80',
                title: 'Birthday Vibe 🎉',
                caption: 'Celebrating your 15th birthday in style!'
            }
        ];

        let currentIndex = 0;
        let isPlaying = true;
        let slideInterval = null;

        const mainImg = document.getElementById('mainImage');
        const capTitle = document.getElementById('captionTitle');
        const capSub = document.getElementById('captionSub');
        const thumbsGrid = document.getElementById('thumbsGrid');
        const playPauseBtn = document.getElementById('playPauseBtn');

        // Render Thumbnails
        function initGallery() {
            thumbsGrid.innerHTML = '';
            photos.forEach((p, index) => {
                const thumb = document.createElement('div');
                thumb.className = `thumb-item ${index === 0 ? 'active' : ''}`;
                thumb.onclick = () => goToSlide(index);

                const img = document.createElement('img');
                img.src = p.src;
                img.onerror = () => { img.src = p.fallback; };

                thumb.appendChild(img);
                thumbsGrid.appendChild(thumb);
            });

            updateSlide();
            startAutoPlay();
        }

        function updateSlide() {
            const photo = photos[currentIndex];

            // Smooth Fade
            mainImg.style.opacity = '0';
            setTimeout(() => {
                mainImg.src = photo.src;
                mainImg.onerror = () => { mainImg.src = photo.fallback; };
                capTitle.innerText = photo.title;
                capSub.innerText = photo.caption;
                mainImg.style.opacity = '1';
            }, 200);

            // Update active thumbnail
            const allThumbs = document.querySelectorAll('.thumb-item');
            allThumbs.forEach((t, i) => {
                if (i === currentIndex) t.classList.add('active');
                else t.classList.remove('active');
            });
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % photos.length;
            updateSlide();
        }

        function prevSlide() {
            currentIndex = (currentIndex - 1 + photos.length) % photos.length;
            updateSlide();
        }

        function goToSlide(index) {
            currentIndex = index;
            updateSlide();
        }

        function startAutoPlay() {
            isPlaying = true;
            playPauseBtn.innerText = 'Pause Auto-Play ⏸️';
            slideInterval = setInterval(nextSlide, 3500); // changes every 3.5 seconds
        }

        function stopAutoPlay() {
            isPlaying = false;
            playPauseBtn.innerText = 'Resume Auto-Play ▶️';
            clearInterval(slideInterval);
        }

        function togglePlay() {
            if (isPlaying) stopAutoPlay();
            else startAutoPlay();
        }

        // Initialize gallery on page load
        window.onload = () => {
            initGallery();
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff69b4', '#e040fb', '#ffffff']
            });
        };
    </script>
</body>
</html>
