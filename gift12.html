<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gift #12 — Scratch Card of Love | Navanshi’s 15th</title>
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f051d;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Star & Wave Canvas Background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .gift-container {
            min-height: 100vh;
            padding: 100px 20px 80px 20px;
            max-width: 950px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-nav {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 100;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 10px 22px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            border-color: rgba(255, 182, 193, 0.6);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
        }

        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(255, 105, 180, 0.3), rgba(233, 30, 99, 0.3));
            color: #ffb6c1;
            border: 1px solid rgba(255, 182, 193, 0.4);
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.2);
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            background: linear-gradient(135deg, #ffffff, #ffb6c1, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            font-size: 1.05rem;
            color: #fce4ec;
            opacity: 0.85;
        }

        /* Controls row for card switching */
        .controls-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 460px;
            margin-bottom: 1rem;
            font-size: 0.95rem;
            color: #ffb6c1;
            font-weight: 600;
        }

        .action-link {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        .action-link:hover { opacity: 1; color: #ff69b4; }

        /* Scratch Card Wrapper */
        .scratch-card-wrapper {
            position: relative;
            width: 100%;
            max-width: 460px;
            height: 280px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            border: 1px solid rgba(255, 192, 203, 0.3);
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .card-content {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            z-index: 1;
        }

        .reason-number {
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: #ffb6c1;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
            font-weight: 700;
        }

        .reason-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #ffffff;
            line-height: 1.4;
        }

        canvas.scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            cursor: grab;
            touch-action: none;
        }
        canvas.scratch-canvas:active {
            cursor: grabbing;
        }

        /* Navigation Buttons */
        .card-nav-row {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        .nav-card-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .nav-card-btn:hover {
            background: rgba(255, 105, 180, 0.3);
            border-color: #ff69b4;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
        }

        @media (max-width: 600px) {
            .page-title { font-size: 2.1rem; }
            .scratch-card-wrapper { height: 240px; }
            .reason-text { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <!-- Starfield & Waves Canvas Background -->
    <canvas id="bg-canvas"></canvas>

    <!-- Navigation -->
    <div class="back-nav">
        <a href="index.html" class="glass-btn">
            ← Back to Dashboard
        </a>
    </div>

    <div class="gift-container">
        <header class="page-header">
            <span class="page-badge">Gift #12 • Scratch Card of Love</span>
            <h1 class="page-title">Scratch to Reveal ✨</h1>
            <p class="page-subtitle">Use your finger or mouse to scratch the foil and reveal why you're so special!</p>
        </header>

        <div class="controls-info">
            <span id="counterText">Card 1 of 10</span>
            <button class="action-link" onclick="autoReveal()">✨ Instant Reveal All</button>
        </div>

        <!-- Scratch Card Container -->
        <div class="scratch-card-wrapper">
            <div class="card-content">
                <div class="reason-number" id="reasonNum">Reason #1</div>
                <div class="reason-text" id="reasonText">I love your eyes!</div>
            </div>
            <canvas id="scratchCanvas" class="scratch-canvas"></canvas>
        </div>

        <div class="card-nav-row">
            <button class="nav-card-btn" onclick="prevCard()">← Previous</button>
            <button class="nav-card-btn" onclick="nextCard()">Next →</button>
        </div>
    </div>

    <script>
        /* --- STARS & WAVE CANVAS ANIMATION --- */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let width, height, stars = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            const starCount = Math.floor((width * height) / 3000);
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random(),
                    speed: Math.random() * 0.02 + 0.005,
                    twinkleDir: Math.random() > 0.5 ? 1 : -1
                });
            }
        }

        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, '#0f051d');
            grad.addColorStop(0.5, '#1a0933');
            grad.addColorStop(1, '#090212');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                star.alpha += star.speed * star.twinkleDir;
                if (star.alpha >= 1) { star.alpha = 1; star.twinkleDir = -1; }
                if (star.alpha <= 0.2) { star.alpha = 0.2; star.twinkleDir = 1; }

                ctx.save();
                ctx.globalAlpha = star.alpha;
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#ffb6c1';
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            const time = Date.now() * 0.001;
            drawWave(time, 0.002, 40, '#ff1493', 0.08);
            drawWave(time + 2, 0.003, 30, '#8a2be2', 0.06);

            requestAnimationFrame(drawBackground);
        }

        function drawWave(time, speed, amplitude, color, alpha) {
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(0, height * 0.7);
            for (let x = 0; x <= width; x += 10) {
                const y = Math.sin(x * speed + time) * amplitude + Math.cos(x * 0.001 + time) * (amplitude / 2) + (height * 0.7);
                ctx.lineTo(x, y);
            }
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.globalAlpha = alpha;
            ctx.fill();
            ctx.restore();
        }

        window.addEventListener('resize', resize);
        resize();
        drawBackground();

        /* --- 10 REASONS DATA --- */
        const reasons = [
            { num: "Reason #1", text: "I love your gorgeous eyes!" },
            { num: "Reason #2", text: "I love your radiant smile!" },
            { num: "Reason #3", text: "I love your incredible humor!" },
            { num: "Reason #4", text: "You are exceptionally funny!" },
            { num: "Reason #5", text: "You are the prettiest person ever!" },
            { num: "Reason #6", text: "You always truly understand me." },
            { num: "Reason #7", text: "You have a wonderful personality." },
            { num: "Reason #8", text: "You are so deeply kind." },
            { num: "Reason #9", text: "You have a pure, good heart." },
            { num: "Reason #10", text: "Simply put... you are my everything!" }
        ];

        let currentIndex = 0;

        /* --- SCRATCH CARD MECHANIC --- */
        const sCanvas = document.getElementById("scratchCanvas");
        const sCtx = sCanvas.getContext("2d", { willReadFrequently: true });
        let isDrawing = false;

        function initScratchCard() {
            sCanvas.width = sCanvas.offsetWidth;
            sCanvas.height = sCanvas.offsetHeight;

            // Draw foil gradient
            const foilGrad = sCtx.createLinearGradient(0, 0, sCanvas.width, sCanvas.height);
            foilGrad.addColorStop(0, '#e0e0e0');
            foilGrad.addColorStop(0.5, '#b0b0b0');
            foilGrad.addColorStop(1, '#d8d8d8');
            sCtx.fillStyle = foilGrad;
            sCtx.fillRect(0, 0, sCanvas.width, sCanvas.height);

            // Add foil texture text
            sCtx.font = "bold 16px Inter, sans-serif";
            sCtx.fillStyle = "rgba(100, 100, 100, 0.4)";
            sCtx.textAlign = "center";
            sCtx.fillText("✨ Scratch Here ✨", sCanvas.width / 2, sCanvas.height / 2 + 6);
        }

        function loadCard(index) {
            currentIndex = index;
            document.getElementById("reasonNum").innerText = reasons[currentIndex].num;
            document.getElementById("reasonText").innerText = reasons[currentIndex].text;
            document.getElementById("counterText").innerText = `Card ${currentIndex + 1} of ${reasons.length}`;
            initScratchCard();
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % reasons.length;
            loadCard(currentIndex);
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + reasons.length) % reasons.length;
            loadCard(currentIndex);
        }

        function autoReveal() {
            sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
        }

        // Scratch event handlers
        function getPos(e) {
            const rect = sCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function scratch(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getPos(e);
            sCtx.globalCompositeOperation = 'destination-out';
            sCtx.beginPath();
            sCtx.arc(pos.x, pos.y, 30, 0, Math.PI * 2);
            sCtx.fill();
        }

        sCanvas.addEventListener('mousedown', (e) => { isDrawing = true; scratch(e); });
        window.addEventListener('mousemove', scratch);
        window.addEventListener('mouseup', () => { isDrawing = false; });

        sCanvas.addEventListener('touchstart', (e) => { isDrawing = true; scratch(e); }, { passive: false });
        window.addEventListener('touchmove', scratch, { passive: false });
        window.addEventListener('touchend', () => { isDrawing = false; });

        window.addEventListener('resize', () => {
            initScratchCard();
        });

        // Initial setup
        loadCard(0);
    </script>
</body>
</html>
