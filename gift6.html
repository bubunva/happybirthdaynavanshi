<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gift #6 — 100 Memories Slideshow | Navanshi’s 15th</title>
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f051d;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Star & Wave Canvas Background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .gift-container {
            min-height: 100vh;
            padding: 90px 20px 60px 20px;
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-nav {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 100;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 10px 22px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            border-color: rgba(255, 182, 193, 0.6);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
        }

        .page-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .page-badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(255, 105, 180, 0.3), rgba(233, 30, 99, 0.3));
            color: #ffb6c1;
            border: 1px solid rgba(255, 182, 193, 0.4);
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.2);
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            background: linear-gradient(135deg, #ffffff, #ffb6c1, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            font-size: 1rem;
            color: #fce4ec;
            opacity: 0.85;
        }

        /* Slideshow Card Stage */
        .slideshow-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            border: 1px solid rgba(255, 192, 203, 0.3);
            border-radius: 28px;
            padding: 1.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            margin-bottom: 2rem;
        }

        /* Image Display Box */
        .photo-stage {
            position: relative;
            width: 100%;
            height: 480px;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .slide-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 12px;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        /* Navigation Arrows */
        .slide-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .slide-arrow:hover {
            background: rgba(255, 105, 180, 0.8);
            transform: translateY(-50%) scale(1.1);
        }

        .slide-arrow.prev { left: 15px; }
        .slide-arrow.next { right: 15px; }

        /* Controls Bar */
        .controls-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin-top: 1.2rem;
            padding: 0 10px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .photo-counter {
            font-size: 1rem;
            font-weight: 700;
            color: #ffb6c1;
            letter-spacing: 1px;
        }

        .play-controls {
            display: flex;
            gap: 10px;
        }

        .ctrl-btn {
            background: linear-gradient(135deg, #ff69b4, #e91e63);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.3);
        }

        .ctrl-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 105, 180, 0.6);
        }

        /* Thumbnails Strip */
        .thumb-strip-container {
            width: 100%;
            margin-top: 1.5rem;
            text-align: left;
        }

        .thumb-heading {
            font-size: 1rem;
            color: #ffb6c1;
            font-weight: 600;
            margin-bottom: 0.8rem;
        }

        .thumb-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 10px;
            max-height: 220px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .thumb-grid::-webkit-scrollbar {
            width: 6px;
        }
        .thumb-grid::-webkit-scrollbar-thumb {
            background: rgba(255, 105, 180, 0.5);
            border-radius: 10px;
        }

        .thumb-item {
            width: 100%;
            height: 70px;
            border-radius: 10px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            opacity: 0.6;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.1);
        }

        .thumb-item:hover, .thumb-item.active {
            opacity: 1;
            border-color: #ff69b4;
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(255, 105, 180, 0.6);
        }

        @media (max-width: 600px) {
            .page-title { font-size: 2.1rem; }
            .photo-stage { height: 320px; }
            .slide-arrow { width: 40px; height: 40px; font-size: 1.2rem; }
            .thumb-grid { grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); }
            .thumb-item { height: 55px; }
        }
    </style>
</head>
<body>

    <!-- Starfield Background Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Navigation -->
    <div class="back-nav">
        <a href="index.html" class="glass-btn">
            ← Back to Dashboard
        </a>
    </div>

    <div class="gift-container">
        <header class="page-header">
            <span class="page-badge">Gift #6 • Photo Gallery</span>
            <h1 class="page-title">100 Memories of Navanshi 📸</h1>
            <p class="page-subtitle">A special slideshow showcasing 100 precious moments!</p>
        </header>

        <!-- Main Slideshow Card -->
        <div class="slideshow-card">
            <div class="photo-stage">
                <button class="slide-arrow prev" onclick="changeSlide(-1)">❮</button>
                <img id="mainImage" class="slide-img" src="photos/photo1.jpg" alt="Memory Photo" onerror="handleImageError(this)">
                <button class="slide-arrow next" onclick="changeSlide(1)">❯</button>
            </div>

            <!-- Controls -->
            <div class="controls-bar">
                <div class="photo-counter" id="photoCounter">Photo 1 of 100</div>
                <div class="play-controls">
                    <button class="ctrl-btn" id="playPauseBtn" onclick="toggleAutoplay()">▶ Autoplay</button>
                </div>
            </div>

            <!-- Thumbnail Grid -->
            <div class="thumb-strip-container">
                <div class="thumb-heading">Quick Jump Gallery (100 Photos):</div>
                <div class="thumb-grid" id="thumbGrid"></div>
            </div>
        </div>
    </div>

    <script>
        /* --- BACKGROUND CANVAS ANIMATION --- */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            const starCount = Math.floor((width * height) / 3000);
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random(),
                    speed: Math.random() * 0.02 + 0.005,
                    twinkleDir: Math.random() > 0.5 ? 1 : -1
                });
            }
        }

        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, '#0f051d');
            grad.addColorStop(0.5, '#1a0933');
            grad.addColorStop(1, '#090212');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                star.alpha += star.speed * star.twinkleDir;
                if (star.alpha >= 1) { star.alpha = 1; star.twinkleDir = -1; }
                if (star.alpha <= 0.2) { star.alpha = 0.2; star.twinkleDir = 1; }

                ctx.save();
                ctx.globalAlpha = star.alpha;
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#ffb6c1';
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            requestAnimationFrame(drawBackground);
        }

        window.addEventListener('resize', resize);
        resize();
        drawBackground();

        /* --- 100 SLIDESHOW GALLERY LOGIC --- */
        const TOTAL_PHOTOS = 100;
        let currentIndex = 1;
        let autoplayInterval = null;

        const mainImage = document.getElementById('mainImage');
        const photoCounter = document.getElementById('photoCounter');
        const thumbGrid = document.getElementById('thumbGrid');
        const playPauseBtn = document.getElementById('playPauseBtn');

        // Render 100 Thumbnails
        function buildThumbnails() {
            for (let i = 1; i <= TOTAL_PHOTOS; i++) {
                const img = document.createElement('img');
                img.src = `photos/photo${i}.jpg`;
                img.className = `thumb-item ${i === 1 ? 'active' : ''}`;
                img.id = `thumb-${i}`;
                img.onclick = () => goToSlide(i);
                img.onerror = function() {
                    this.src = `https://via.placeholder.com/150/ff69b4/ffffff?text=Photo+${i}`;
                };
                thumbGrid.appendChild(img);
            }
        }

        function updateSlide() {
            mainImage.style.opacity = '0';
            setTimeout(() => {
                mainImage.src = `photos/photo${currentIndex}.jpg`;
                photoCounter.innerText = `Photo ${currentIndex} of ${TOTAL_PHOTOS}`;
                
                // Highlight active thumbnail
                document.querySelectorAll('.thumb-item').forEach(el => el.classList.remove('active'));
                const activeThumb = document.getElementById(`thumb-${currentIndex}`);
                if (activeThumb) {
                    activeThumb.classList.add('active');
                    activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }

                mainImage.style.opacity = '1';
            }, 200);
        }

        function changeSlide(direction) {
            currentIndex += direction;
            if (currentIndex > TOTAL_PHOTOS) currentIndex = 1;
            if (currentIndex < 1) currentIndex = TOTAL_PHOTOS;
            updateSlide();
        }

        function goToSlide(index) {
            currentIndex = index;
            updateSlide();
        }

        function toggleAutoplay() {
            if (autoplayInterval) {
                clearInterval(autoplayInterval);
                autoplayInterval = null;
                playPauseBtn.innerText = '▶ Autoplay';
            } else {
                autoplayInterval = setInterval(() => {
                    changeSlide(1);
                }, 3000);
                playPauseBtn.innerText = '⏸ Pause';
            }
        }

        function handleImageError(img) {
            img.src = `https://via.placeholder.com/800x500/1a0933/ffb6c1?text=Photo+${currentIndex}+Placeholder`;
        }

        buildThumbnails();
    </script>
</body>
</html>
