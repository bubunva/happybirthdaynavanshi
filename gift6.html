<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gift #6 — Custom Meme Gallery | Navanshi’s 15th</title>
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f051d;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Star & Wave Canvas Background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .gift-container {
            min-height: 100vh;
            padding: 100px 20px 80px 20px;
            max-width: 950px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-nav {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 100;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 10px 22px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            border-color: rgba(255, 182, 193, 0.6);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
        }

        .page-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .page-badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(255, 105, 180, 0.3), rgba(233, 30, 99, 0.3));
            color: #ffb6c1;
            border: 1px solid rgba(255, 182, 193, 0.4);
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.2);
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            background: linear-gradient(135deg, #ffffff, #ffb6c1, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            font-size: 1.05rem;
            color: #fce4ec;
            opacity: 0.85;
        }

        /* Slideshow Card container */
        .slideshow-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            border: 1px solid rgba(255, 192, 203, 0.3);
            border-radius: 32px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .meme-counter {
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: #ffb6c1;
            text-transform: uppercase;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .meme-frame {
            width: 100%;
            height: 380px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 182, 193, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            margin-bottom: 1.5rem;
        }

        .meme-frame img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.4s ease;
        }

        .controls-row {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .ctrl-btn:hover {
            transform: translateY(-2px);
            background: rgba(255, 105, 180, 0.3);
            border-color: #ff69b4;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
        }

        .dots-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 650px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: #ff69b4;
            width: 25px;
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(255, 105, 180, 0.6);
        }

        @media (max-width: 600px) {
            .page-title { font-size: 2.1rem; }
            .meme-frame { height: 280px; }
        }
    </style>
</head>
<body>

    <!-- Starfield & Waves Canvas Background -->
    <canvas id="bg-canvas"></canvas>

    <!-- Navigation -->
    <div class="back-nav">
        <a href="index.html" class="glass-btn">
            ← Back to Dashboard
        </a>
    </div>

    <div class="gift-container">
        <header class="page-header">
            <span class="page-badge">Gift #6 • Custom Meme Vault</span>
            <h1 class="page-title">Meme Gallery 😂</h1>
            <p class="page-subtitle">14 hand-crafted memes made personally just for you!</p>
        </header>

        <!-- Slideshow Card -->
        <div class="slideshow-card">
            <div class="meme-counter" id="memeCounter">Meme 1 of 14</div>
            
            <div class="meme-frame">
                <img id="memeImg" src="meme1.png" alt="Custom Meme">
            </div>

            <div class="controls-row">
                <button class="ctrl-btn" onclick="prevMeme()">← Previous</button>
                <button class="ctrl-btn" onclick="nextMeme()">Next →</button>
            </div>
        </div>

        <!-- Pagination Dots -->
        <div class="dots-row" id="dotsRow"></div>
    </div>

    <script>
        /* --- STARS & WAVE CANVAS ANIMATION --- */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let width, height, stars = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            const starCount = Math.floor((width * height) / 3000);
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random(),
                    speed: Math.random() * 0.02 + 0.005,
                    twinkleDir: Math.random() > 0.5 ? 1 : -1
                });
            }
        }

        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, '#0f051d');
            grad.addColorStop(0.5, '#1a0933');
            grad.addColorStop(1, '#090212');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                star.alpha += star.speed * star.twinkleDir;
                if (star.alpha >= 1) { star.alpha = 1; star.twinkleDir = -1; }
                if (star.alpha <= 0.2) { star.alpha = 0.2; star.twinkleDir = 1; }

                ctx.save();
                ctx.globalAlpha = star.alpha;
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#ffb6c1';
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            const time = Date.now() * 0.001;
            drawWave(time, 0.002, 40, '#ff1493', 0.08);
            drawWave(time + 2, 0.003, 30, '#8a2be2', 0.06);

            requestAnimationFrame(drawBackground);
        }

        function drawWave(time, speed, amplitude, color, alpha) {
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(0, height * 0.7);
            for (let x = 0; x <= width; x += 10) {
                const y = Math.sin(x * speed + time) * amplitude + Math.cos(x * 0.001 + time) * (amplitude / 2) + (height * 0.7);
                ctx.lineTo(x, y);
            }
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.globalAlpha = alpha;
            ctx.fill();
            ctx.restore();
        }

        window.addEventListener('resize', resize);
        resize();
        drawBackground();

        /* --- 14 MEMES DATA ARRAY --- */
        const memes = [
            { img: "meme1.png" },
            { img: "meme2.png" },
            { img: "meme3.png" },
            { img: "meme4.png" },
            { img: "meme5.png" },
            { img: "meme6.png" },
            { img: "meme7.png" },
            { img: "meme8.png" },
            { img: "meme9.png" },
            { img: "meme10.png" },
            { img: "meme11.png" },
            { img: "meme12.png" },
            { img: "meme13.png" },
            { img: "meme14.png" }
        ];

        let currentMemeIdx = 0;

        document.addEventListener("DOMContentLoaded", () => {
            renderDots();
            loadMeme(0);
        });

        function renderDots() {
            const row = document.getElementById("dotsRow");
            row.innerHTML = "";
            memes.forEach((_, i) => {
                const dot = document.createElement("div");
                dot.className = `dot ${i === currentMemeIdx ? 'active' : ''}`;
                dot.onclick = () => loadMeme(i);
                row.appendChild(dot);
            });
        }

        function loadMeme(index) {
            currentMemeIdx = index;
            const m = memes[currentMemeIdx];

            document.getElementById("memeCounter").innerText = `Meme ${currentMemeIdx + 1} of ${memes.length}`;
            document.getElementById("memeImg").src = m.img;

            // Update dots
            const dots = document.querySelectorAll(".dot");
            dots.forEach((d, i) => {
                d.classList.toggle("active", i === currentMemeIdx);
            });
        }

        function nextMeme() {
            currentMemeIdx = (currentMemeIdx + 1) % memes.length;
            loadMeme(currentMemeIdx);
        }

        function prevMeme() {
            currentMemeIdx = (currentMemeIdx - 1 + memes.length) % memes.length;
            loadMeme(currentMemeIdx);
        }

        // Keyboard navigation support
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextMeme();
            if (e.key === 'ArrowLeft') prevMeme();
        });
    </script>
</body>
</html>
